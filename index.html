<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090B">
    <title>FitAI Pro - Entrenador Personal Inteligente</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Critical above-fold styles for faster perceived load */
        body { background: #09090B; }
        .loading-screen { background: #09090B; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="loading-icon">&#9775;</div>
                <h1>FitAI</h1>
                <p>Entrenador personal inteligente</p>
                <div class="loading-bar"><div class="loading-fill"></div></div>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="main-app hidden">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="app-title">FitAI</h1>
                </div>
                <div class="header-right">
                    <button id="btn-settings" class="icon-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <main id="page-content" class="page-content">
                <!-- Pages will be injected here -->
            </main>

            <!-- Bottom Navigation - Clean 5 tabs -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-page="dashboard">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
                    <span class="nav-label">Inicio</span>
                </button>
                <button class="nav-item" data-page="routines">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
                    <span class="nav-label">Entreno</span>
                </button>
                <button class="nav-item" data-page="scan">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
                    <span class="nav-label">Escaneo</span>
                </button>
                <button class="nav-item" data-page="ai-coach">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
                    <span class="nav-label">Coach IA</span>
                </button>
                <button class="nav-item" data-page="profile">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                    <span class="nav-label">Perfil</span>
                </button>
            </nav>
        </div>

        <!-- Onboarding Modal -->
        <div id="onboarding-modal" class="modal hidden">
            <div class="modal-content onboarding">
                <div id="onboarding-steps"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/data/exercises-db.js"></script>
    <script src="src/utils/storage.js"></script>
    <script src="src/utils/ai-engine.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/utils/fitness-tools.js"></script>
    <script src="src/components/body-map.js"></script>
    <script src="src/components/routine-builder.js"></script>
    <script src="src/pages/dashboard.js"></script>
    <script src="src/pages/routines.js"></script>
    <script src="src/pages/exercises.js"></script>
    <script src="src/pages/ai-coach.js"></script>
    <script src="src/pages/progress.js"></script>
    <script src="src/pages/nutrition.js"></script>
    <script src="src/pages/goals.js"></script>
    <script src="src/pages/profile.js"></script>
    <script src="src/pages/assessment.js"></script>
    <script src="src/pages/muscle-stats.js"></script>
    <script src="src/pages/scan.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
