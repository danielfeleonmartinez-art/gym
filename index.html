<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitAI - Tu Entrenador Personal con IA</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="stylesheet" href="src/css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="loading-icon">🏋️</div>
                <h1>FitAI</h1>
                <p>Tu entrenador personal inteligente</p>
                <div class="loading-bar"><div class="loading-fill"></div></div>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="main-app hidden">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="app-title">FitAI</h1>
                </div>
                <div class="header-right">
                    <button id="btn-notifications" class="icon-btn">🔔</button>
                    <button id="btn-settings" class="icon-btn">⚙️</button>
                </div>
            </header>

            <!-- Page Content -->
            <main id="page-content" class="page-content">
                <!-- Pages will be injected here -->
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">Inicio</span>
                </button>
                <button class="nav-item" data-page="routines">
                    <span class="nav-icon">💪</span>
                    <span class="nav-label">Rutinas</span>
                </button>
                <button class="nav-item" data-page="exercises">
                    <span class="nav-icon">📚</span>
                    <span class="nav-label">Ejercicios</span>
                </button>
                <button class="nav-item" data-page="ai-coach">
                    <span class="nav-icon">🤖</span>
                    <span class="nav-label">IA Coach</span>
                </button>
                <button class="nav-item" data-page="progress">
                    <span class="nav-icon">📈</span>
                    <span class="nav-label">Progreso</span>
                </button>
                <button class="nav-item" data-page="nutrition">
                    <span class="nav-icon">🥗</span>
                    <span class="nav-label">Nutrición</span>
                </button>
                <button class="nav-item" data-page="goals">
                    <span class="nav-icon">🎯</span>
                    <span class="nav-label">Metas</span>
                </button>
                <button class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">Perfil</span>
                </button>
            </nav>
        </div>

        <!-- Onboarding Modal -->
        <div id="onboarding-modal" class="modal hidden">
            <div class="modal-content onboarding">
                <div id="onboarding-steps"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/data/exercises-db.js"></script>
    <script src="src/utils/storage.js"></script>
    <script src="src/utils/ai-engine.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/components/body-map.js"></script>
    <script src="src/components/routine-builder.js"></script>
    <script src="src/pages/dashboard.js"></script>
    <script src="src/pages/routines.js"></script>
    <script src="src/pages/exercises.js"></script>
    <script src="src/pages/ai-coach.js"></script>
    <script src="src/pages/progress.js"></script>
    <script src="src/pages/nutrition.js"></script>
    <script src="src/pages/goals.js"></script>
    <script src="src/pages/profile.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
